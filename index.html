<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일신오토클레이브 - ISOSTATIC PRESS 기술자료</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 기본 스타일 설정 */
        :root {
            --primary-blue: #2a439c;
            --accent-blue: #4facfe;
            --bg-color: #111113;
            --card-bg: #1e1e21;
            --text-main: #ffffff;
            --text-sub: #a0a0a5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* 상단 헤더 영역 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(17, 17, 19, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.3rem;
            text-decoration: none;
            color: white;
        }

        .logo-mark {
            background-color: var(--primary-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .search-box {
            background-color: #252529;
            border: 1px solid #333338;
            padding: 8px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-sub);
            width: 280px;
        }

        .search-box span { font-size: 0.9rem; }
        .search-key { 
            border: 1px solid #444; 
            padding: 1px 6px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            margin-left: auto;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active { color: white; }
        nav a.active { color: var(--primary-blue); font-weight: 700; }

        /* 히어로 섹션 */
        .hero {
            padding: 100px 0 60px;
            position: relative;
        }

        .hero-title-brand {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary-blue), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 25px;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-sub);
            max-width: 650px;
            margin-bottom: 45px;
        }

        /* 버튼 영역 */
        .hero-buttons {
            display: flex;
            gap: 15px;
            z-index: 10;
            position: relative;
        }
